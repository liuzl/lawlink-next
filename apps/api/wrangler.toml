# Cloudflare-native runtime (Stage 1): the whole app runs inside ONE Durable
# Object with embedded SQLite (real synchronous transactions). The Worker entry
# (src/worker.ts) forwards every request to that singleton DO. Local dev:
# `wrangler dev` runs a real DO-backed SQLite via miniflare — no CF account.
#
# Stage 1 mounts only health/login/list-matters to prove the stack. The full
# route set + SPA assets + R2 + the transaction sync-rewrite are Stage 2.
name = "lawlink-next"
main = "src/worker.ts"
compatibility_date = "2026-03-12"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "LAWLINK_DO"
class_name = "LawlinkDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LawlinkDO"]

[observability]
enabled = true

# Dev-only JWT secret. Production: `wrangler secret put LAWLINK_JWT_SECRET`
# (a real secret overrides this var).
[vars]
LAWLINK_JWT_SECRET = "dev-only-secret-change-me-0123456789abcdef"

# Stage 2 will add (mirroring baize):
#   [assets] directory = "../web/dist", not_found_handling = "single-page-application", run_worker_first = ["/api/*"]
#   [[r2_buckets]] binding = "STORAGE", bucket_name = "lawlink-storage"
