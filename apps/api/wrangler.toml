# Cloudflare-native runtime: the Hono app (src/index.ts) runs directly as the
# Worker (a Hono app's default export IS a Workers fetch handler) over Cloudflare
# D1 (the `DB` binding) + R2 (`STORAGE`). The same app runs under Node via
# src/server.ts, where these bindings are absent and it falls back to libSQL + fs.
#
# Local dev: `pnpm --filter @lawlink/api d1:migrate:local` then `wrangler dev`
# (miniflare runs a real local D1-backed SQLite + R2 — no Cloudflare account).
name = "lawlink-next"
main = "src/index.ts"
compatibility_date = "2026-03-12"
compatibility_flags = ["nodejs_compat"]

# Built SPA. `run_worker_first` routes /api/* to the Worker; every other path is
# served from the static build, with client-router paths falling back to the SPA
# shell (index.html) instead of a 404.
[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# D1: bound as `DB` (env.DB → createD1Db). migrations_dir points at the Drizzle
# migration set so `wrangler d1 migrations apply` runs the same SQL as the Node
# libSQL migrator. Replace database_id with the real id from `wrangler d1 create
# lawlink-db` before any --remote use; the placeholder is fine for --local.
[[d1_databases]]
binding = "DB"
database_name = "lawlink-db"
database_id = "a74454c3-7d91-42b9-b8f7-982d3b7f1a17"
migrations_dir = "../../packages/db/migrations"

# R2: bound as `STORAGE` (env.STORAGE → createR2Storage) for document/template blobs.
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "lawlink-storage"

[observability]
enabled = true

# LAWLINK_JWT_SECRET is a Worker SECRET (set via `wrangler secret put`), not a
# [vars] entry — a var and secret of the same name collide. Local `wrangler dev`
# reads it from apps/api/.env instead.
