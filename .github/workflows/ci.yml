name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          # pnpm is enabled via corepack below, so skip the built-in
          # package-manager cache (it would run before pnpm exists).
          package-manager-cache: false

      - name: Enable pnpm (from package.json packageManager)
        run: corepack enable

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck
